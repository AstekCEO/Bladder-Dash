<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bladder Dash — by BladderIQ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
  }
  canvas {
    border: 3px solid #00ccff;
    border-radius: 8px;
    display: block;
    max-width: 100vw;
    max-height: 80vh;
    touch-action: none;
  }
  #controls {
    display: flex;
    gap: 20px;
    margin-top: 16px;
  }
  .ctrl-btn {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 3px solid #00ccff;
    background: rgba(0,204,255,0.15);
    color: #00ccff;
    font-size: 32px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s;
  }
  .ctrl-btn:active { background: rgba(0,204,255,0.4); }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>
<div id="controls">
  <button class="ctrl-btn" id="btn-left">◀</button>
  <button class="ctrl-btn" id="btn-right">▶</button>
</div>

// Prerender emojis to offscreen canvases (fixes Chrome canvas emoji bug)
const emojiCache = {};
function prerenderEmoji(emoji, size) {
  if (emojiCache[emoji]) return emojiCache[emoji];
  const c = document.createElement('canvas');
  c.width = size * 2; c.height = size * 2;
  const x = c.getContext('2d');
  x.font = size + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(emoji, size, size);
  emojiCache[emoji] = c;
  return c;
}

// --- STATE ---
let state = 'title';
let lane = 1, score = 0, biq = 50, round = 1;
let items = [], particles = [];
let spawnT = 0, roundT = 0, lastT = 0;
let speed = ITEM_SPEED_BASE, spawnI = SPAWN_BASE;
let combo = 0, maxCombo = 0;
let shakeT = 0, flashC = null, flashT = 0;

function px() { return lane * LANE_W + LANE_W / 2; }
function py() { return canvas.height - 80; }

function moveLane(d) { if (state === 'playing') lane = Math.max(0, Math.min(LANES-1, lane+d)); }

function spawn() {
  const good = Math.random() < 0.55;
  const pool = good ? GOOD : BAD;
  const it = pool[Math.floor(Math.random() * pool.length)];
  items.push({ ...it, lane: Math.floor(Math.random() * LANES), y: -ITEM_SIZE, good, col: false });
}

function burst(x, y, c, n) {
  for (let i = 0; i < n; i++)
    particles.push({ x, y, vx: (Math.random()-.5)*6, vy: (Math.random()-.5)*6-2, life: 1, c, s: 3+Math.random()*4 });
}

// --- INPUT ---
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); moveLane(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); moveLane(1); }
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); action(); }
});
canvas.setAttribute('tabindex', '0');
canvas.focus();
canvas.addEventListener('blur', () => setTimeout(() => canvas.focus(), 100));

document.getElementById('btn-left').addEventListener('pointerdown', e => { e.preventDefault(); moveLane(-1); });
document.getElementById('btn-right').addEventListener('pointerdown', e => { e.preventDefault(); moveLane(1); });

let touchX = null;
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (state !== 'playing') { action(); return; } touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left; });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (touchX !== null && state === 'playing') { const dx = (e.changedTouches[0].clientX - canvas.getBoundingClientRect().left) - touchX; if (Math.abs(dx) > 20) moveLane(dx > 0 ? 1 : -1); } touchX = null; });
canvas.addEventListener('click', () => { if (state !== 'playing') action(); });

function action() {
  if (state === 'title') startRound();
  else if (state === 'roundEnd') { if (round < MAX_ROUNDS) { round++; startRound(); } else state = 'gameOver'; }
  else if (state === 'gameOver') { round = 1; score = 0; biq = 50; combo = 0; maxCombo = 0; state = 'title'; }
}

function startRound() {
  state = 'playing'; items = []; particles = []; roundT = ROUND_TIME; spawnT = 0; lane = 1; combo = 0;
  speed = ITEM_SPEED_BASE + (round-1) * ITEM_SPEED_INC;
  spawnI = Math.max(SPAWN_MIN, SPAWN_BASE - (round-1) * 60);
}

// --- UPDATE ---
function update(dt) {
  if (state !== 'playing') return;
  roundT -= dt / 1000;
  if (roundT <= 0) { state = 'roundEnd'; return; }

  spawnT -= dt;
  if (spawnT <= 0) { spawn(); spawnT = spawnI + (Math.random()-.5)*200; }

  for (let it of items) it.y += speed * (dt / 16);

  const ppx = px(), ppy = py();
  for (let it of items) {
    if (it.col) continue;
    const ix = it.lane * LANE_W + LANE_W / 2;
    if (Math.abs(ix - ppx) < LANE_W * 0.6 && Math.abs(it.y - ppy) < PLAYER_SIZE) {
      it.col = true;
      score += it.pts * (1 + Math.floor(combo/5)*0.5);
      biq = Math.max(0, Math.min(100, biq + (it.good ? 3 : -5)));
      if (it.good) { combo++; maxCombo = Math.max(maxCombo, combo); burst(ix, it.y, GREEN, 8); flashC = 'rgba(0,238,119,0.15)'; }
      else { combo = 0; shakeT = 200; burst(ix, it.y, RED, 10); flashC = 'rgba(255,51,85,0.15)'; }
      flashT = 150;
    }
  }

  items = items.filter(it => {
    if (it.y > canvas.height + ITEM_SIZE && !it.col) { if (!it.good) score += 5; return false; }
    return !it.col;
  });

  for (let p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= dt/500; }
  particles = particles.filter(p => p.life > 0);
  if (shakeT > 0) shakeT -= dt;
  if (flashT > 0) flashT -= dt;
  score = Math.max(0, Math.round(score));
}

// --- DRAW HELPERS ---
function text(str, x, y, font, color, align) {
  ctx.font = font; ctx.fillStyle = color; ctx.textAlign = align || 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(str, x, y);
}

function rrect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawQR(cx, cy, sz) {
  if (qrLoaded) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx-sz/2-6, cy-sz/2-6, sz+12, sz+12);
    ctx.drawImage(qrImg, cx-sz/2, cy-sz/2, sz, sz);
  } else {
    ctx.strokeStyle = ACCENT; ctx.lineWidth = 2;
    ctx.strokeRect(cx-sz/2, cy-sz/2, sz, sz);
    text('[ QR CODE ]', cx, cy-6, 'bold 14px Courier New', DIM);
    text('Place qr.png in folder', cx, cy+14, '12px Courier New', DIM);
  }
}

// --- DRAW ---
function drawBG() {
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0, BG1); g.addColorStop(1, BG2);
  ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1; ctx.setLineDash([10,10]);
  for (let i = 1; i < LANES; i++) { ctx.beginPath(); ctx.moveTo(i*LANE_W,0); ctx.lineTo(i*LANE_W,canvas.height); ctx.stroke(); }
  ctx.setLineDash([]);
}

function drawPlayer() {
  const x = px(), y = py();
  const gl = ctx.createRadialGradient(x,y,4,x,y,40);
  gl.addColorStop(0, 'rgba(0,204,255,0.5)'); gl.addColorStop(1, 'rgba(0,204,255,0)');
  ctx.fillStyle = gl; ctx.fillRect(x-40,y-40,80,80);
  ctx.fillStyle = 'rgba(0,204,255,0.06)'; ctx.fillRect(lane*LANE_W,0,LANE_W,canvas.height);
  if (logoLoaded) {
    ctx.drawImage(logoImg, x - 26, y - 26, 52, 52);
  } else {
    const pc = prerenderEmoji('💙', 48);
    ctx.drawImage(pc, x - 24, y - 24, 48, 48);
  }
}

function drawItems() {
  for (let it of items) {
    const x = it.lane * LANE_W + LANE_W / 2;
    const ec = prerenderEmoji(it.emoji, 48);
    ctx.drawImage(ec, x - 24, it.y - 24, 48, 48);
  }
}

function drawParticles() {
  for (let p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.s*p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // BladderIQ bar
  const bw=150, bh=16, bx=14, by=14;
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; rrect(bx,by,bw,bh,4); ctx.fill();
  const pct = biq/100;
  ctx.fillStyle = pct > 0.6 ? GREEN : pct > 0.3 ? ACCENT : RED; rrect(bx,by,bw*pct,bh,4); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; rrect(bx,by,bw,bh,4); ctx.stroke();
  text('BladderIQ  ' + biq, bx+4, by+bh+16, 'bold 13px Courier New', WHITE, 'left');

  // Score
  text(score+'', canvas.width-14, 26, 'bold 22px Courier New', ACCENT, 'right');
  text('SCORE', canvas.width-14, 46, 'bold 12px Courier New', DIM, 'right');

  // Timer
  const t = Math.max(0, Math.ceil(roundT));
  text(t+'s', canvas.width/2, 26, 'bold 20px Courier New', t <= 5 ? RED : WHITE);
  text('ROUND '+round+'/'+MAX_ROUNDS, canvas.width/2, 46, 'bold 12px Courier New', DIM);

  // Combo
  if (combo >= 3) text('COMBO x'+combo+'!', 14, 66, 'bold 16px Courier New', GREEN, 'left');
}

function drawTitle() {
  ctx.fillStyle = 'rgba(5,5,16,0.94)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.shadowColor = ACCENT; ctx.shadowBlur = 30;
  text('BLADDER', canvas.width/2, 130, 'bold 48px Courier New', ACCENT);
  text('DASH', canvas.width/2, 185, 'bold 48px Courier New', ACCENT);
  ctx.shadowBlur = 0;
  text('— A BladderIQ Game —', canvas.width/2, 218, 'bold 14px Courier New', WHITE);
  // Draw emoji instructions using prerendered sprites
  const goodE = ['💧','🥦','🏃','🧘'];
  const badE = ['☕','🍺','🌶️','🚫'];
  text('Collect:', canvas.width/2, 258, 'bold 16px Courier New', GREEN);
  for (let i = 0; i < 4; i++) { const ec = prerenderEmoji(goodE[i], 48); ctx.drawImage(ec, 100 + i*60 - 16, 272, 32, 32); }
  text('Dodge:', canvas.width/2, 322, 'bold 16px Courier New', RED);
  for (let i = 0; i < 4; i++) { const ec = prerenderEmoji(badE[i], 48); ctx.drawImage(ec, 100 + i*60 - 16, 336, 32, 32); }
  text('Arrow Keys  /  Swipe  /  Tap', canvas.width/2, 395, '14px Courier New', DIM);
  if (Math.floor(Date.now()/500)%2===0) text('TAP TO START', canvas.width/2, 440, 'bold 22px Courier New', WHITE);
  text('by BladderIQ', canvas.width/2, 560, 'bold 14px Courier New', ACCENT);
}

function drawRoundEnd() {
  ctx.fillStyle = 'rgba(5,5,16,0.94)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.shadowColor = GREEN; ctx.shadowBlur = 16;
  text('ROUND '+round+' COMPLETE', canvas.width/2, 80, 'bold 30px Courier New', GREEN);
  ctx.shadowBlur = 0;
  text('Score: '+score, canvas.width/2, 135, 'bold 20px Courier New', ACCENT);
  text('BladderIQ: '+biq+'/100', canvas.width/2, 170, '18px Courier New', WHITE);
  text('Best Combo: x'+maxCombo, canvas.width/2, 200, '18px Courier New', WHITE);
  drawQR(canvas.width/2, 310, 120);
  text('Download BladderIQ', canvas.width/2, 400, 'bold 16px Courier New', ACCENT);
  if (Math.floor(Date.now()/500)%2===0) text(round < MAX_ROUNDS ? 'TAP FOR NEXT ROUND' : 'TAP TO FINISH', canvas.width/2, 480, 'bold 20px Courier New', WHITE);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(5,5,16,0.94)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.shadowColor = ACCENT; ctx.shadowBlur = 20;
  text('GAME OVER', canvas.width/2, 90, 'bold 40px Courier New', ACCENT);
  ctx.shadowBlur = 0;
  text('Final Score: '+score, canvas.width/2, 145, 'bold 22px Courier New', WHITE);
  const gr = biq >= 80 ? 'A+' : biq >= 60 ? 'A' : biq >= 40 ? 'B' : biq >= 20 ? 'C' : 'D';
  const gc = biq >= 60 ? GREEN : biq >= 30 ? ACCENT : RED;
  ctx.shadowColor = gc; ctx.shadowBlur = 18;
  text(gr, canvas.width/2, 220, 'bold 56px Courier New', gc);
  ctx.shadowBlur = 0;
  text('BladderIQ Grade', canvas.width/2, 255, 'bold 14px Courier New', DIM);
  text('Track your REAL', canvas.width/2, 305, 'bold 18px Courier New', GREEN);
  text('BladderIQ score', canvas.width/2, 330, 'bold 18px Courier New', GREEN);
  drawQR(canvas.width/2, 430, 120);
  if (Math.floor(Date.now()/500)%2===0) text('TAP TO RESTART', canvas.width/2, 540, 'bold 18px Courier New', WHITE);
}

// --- LOOP ---
function loop(ts) {
  const dt = lastT ? Math.min(ts - lastT, 50) : 16; lastT = ts;
  update(dt);
  ctx.save();
  if (shakeT > 0) ctx.translate((Math.random()-.5)*6, (Math.random()-.5)*6);
  drawBG();
  if (state === 'playing') {
    drawItems(); drawPlayer(); drawParticles(); drawHUD();
    if (flashT > 0 && flashC) { ctx.fillStyle = flashC; ctx.fillRect(0,0,canvas.width,canvas.height); }
  } else if (state === 'title') drawTitle();
  else if (state === 'roundEnd') drawRoundEnd();
  else if (state === 'gameOver') drawGameOver();
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
